# migrations/manifest.yaml — single source of truth for migration order
# (epic #43 Phase 3, plan §3.6).
#
# A naive glob of migrations/*.sql is impossible here: *_down.sql files are
# interleaved, numeric prefixes are duplicated (003 ×2, 004 ×2, 018 ×2,
# 021 ×2), 009b is intentionally deferred, and several files must run
# outside a transaction. THIS LIST is the order. *_down.sql files are never
# listed.
#
# Fields per entry:
#   file:  filename relative to migrations/
#   tier:  core     — applied by default (`hippocampus migrate`)
#          library  — applied only with --with-library
#          optional — applied only with --include-optional
#                     (009b HNSW: defer until agent.ghost_memories holds
#                      1000+ rows for the target embed_model)
#          multiuser — applied only with --with-multiuser
#          code     — applied only with --with-code (deja-code index,
#                     issue #76; 034b HNSW is REQUIRED, not deferred)
#   no_tx: true     — file contains CREATE/DROP INDEX CONCURRENTLY or
#                     ALTER TYPE .. ADD VALUE and must NOT be wrapped in a
#                     transaction (runner uses psql autocommit, fresh
#                     session per file)
#          false    — file is transaction-safe (runner uses psql -1)
#   note:  one-line context where non-obvious (plain text, no colons)
#   preflight: company_multiuser — requires the company-multiuser gate
#                                  artifacts before execution or baseline
#   requires_checkpoint: <stage> — holds a pending entry until the named
#                                  database checkpoint is verified
#
# Parsing contract (so the runner needs no pyyaml): this file is plain YAML
# restricted to a line-based subset. Accepted lines, after stripping
# leading/trailing whitespace:
#   - blank lines and lines starting with '#'  -> ignored
#   - 'migrations:'                            -> ignored (list header)
#   - '- file: <filename>'                     -> starts a new entry
#   - 'tier: core|library|optional|multiuser|code'  -> field of current entry
#   - 'no_tx: true|false'                      -> field of current entry
#   - 'note: <free text>'                      -> field of current entry
#   - 'preflight: company_multiuser'           -> field of current entry
#   - 'requires_checkpoint: <stage>'           -> field of current entry
# Values must not need YAML quoting (no leading/trailing quotes, no ':' in
# note text). Anything else is a parse error. hippocampus.migrate enforces
# this; scripts/test_migrate_scanner.py cross-checks the list against the
# actual migrations/ directory and a no-tx SQL scanner.


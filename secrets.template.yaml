# secrets.template.yaml — copy to secrets.enc.yaml and encrypt with sops
#
# Setup:
#   cp secrets.template.yaml secrets.enc.yaml
#   sops edit secrets.enc.yaml   # fill in values, save to encrypt
#
# Required env vars (set in secrets.enc.yaml):
#   PG_URL            — PostgreSQL connection string with pgvector
#                       e.g. postgresql://user:pass@localhost:5432/hippocampus
#
# Optional env vars (can also be set inline or in a separate llm.enc.yaml):
#   BGE_EMBED_URL     — BGE-M3 embed server URL (default: http://127.0.0.1:8082)
#   BGE_EMBED_TOKEN   — Bearer token for embed server (if auth enabled)
#
#
#   ANTHROPIC_API_KEY — Anthropic API key

PG_URL: postgresql://user:password@localhost:5432/hippocampus
BGE_EMBED_URL: http://127.0.0.1:8082
BGE_EMBED_TOKEN: ""
ANTHROPIC_API_KEY: sk-ant-REPLACE_ME
MCP_SSE_TOKEN: ""
# claude.ai connector (OAuth remote MCP — docs/CONNECTOR.md).
# Static confidential client credentials you enter into claude.ai's connector
# "Advanced settings". Generate the secret with e.g. `openssl rand -base64 32`.
HIPPOCAMPUS_CONNECTOR_CLIENT_ID: ""
HIPPOCAMPUS_CONNECTOR_CLIENT_SECRET: ""
